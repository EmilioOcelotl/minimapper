<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>MiniMapper</title>

  <!-- Hydra -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <script src="https://unpkg.com/hydra-synth"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      color: white;
      font-family: monospace;
    }

    textarea {
      width: 400px;
      height: 300px;
    }

    button {
      margin-top: 5px;
    }

    #myCanvas {
      display: block;
      /* Ocultar el canvas de Hydra */
    }
  </style>
</head>

<body>

  <div id="ui">
    <textarea id="code" maxlength="1000">
// ejemplo Hydra
// Puedes cambiar el código y hacer click en RUN para ver los cambios
// También puedes cambiar la cantidad de quads y arrastrar los vértices para mapear la imagen
// Atajos de teclado: CTRL + SHIFT + H para mostrar/ocultar la UI

osc(1,1,1)
  .out()
    </textarea>
    <br>
    <button onclick="runHydra()">RUN</button>
    <label>Quads:</label>
    <select id="quadCount" onchange="setQuadCount(this.value)">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
    </select>
  </div>

  <!-- Canvas de Hydra (oculto) -->
  <canvas id="myCanvas" width="512px" height="512px"></canvas>

  <script>
    // Inicializar Hydra con el canvas oculto
    let uiVisible = true;

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'H') {
        uiVisible = !uiVisible;
        document.getElementById('ui').style.display = uiVisible ? 'block' : 'none';
      }
    });
    var hydra = new Hydra({ canvas: document.getElementById("myCanvas") })   // 👈 importante


    osc(1, 1, 1)
      .out();

    const BLOCKED = [
      'fetch', 'XMLHttpRequest', 'WebSocket',
      'document', 'window', 'location',
      'localStorage', 'sessionStorage', 'indexedDB',
      'navigator', 'history', 'cookie',
      'import', 'require', 'process',
      '__proto__', 'prototype', 'constructor'
    ];

    function runHydra() {
      let code = document.getElementById("code").value;

      // Blocklist
      const found = BLOCKED.find(word => code.includes(word));
      if (found) {
        alert(`"${found}" no está permitido`);
        return;
      }

      try {
        eval(code);
      } catch (e) {
        console.log(e);
      }
    }

    // --- P5 ---

    let hc;
    let quads = [];
    let selected = { quad: -1, vert: -1 };

    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);

      hc = select("#myCanvas");
      hc.hide(); // ocultar hydra

      setQuadCount(1);
    }

    function draw() {
      background(0);

      // --- DIBUJAR QUAD ---
      textureMode(NORMAL); // 👈 UV de 0 a 1, no en píxeles

      texture(hc);
      if (!uiVisible) noStroke();
      else stroke(255);

      textureMode(NORMAL);
      texture(hc);

      if (!uiVisible) noStroke();
      else stroke(255);

      for (let q = 0; q < quads.length; q++) {
        let v = quads[q];

        beginShape();
        vertex(v[0].x, v[0].y, 0, 0);
        vertex(v[1].x, v[1].y, 1, 0);
        vertex(v[2].x, v[2].y, 1, 1);
        vertex(v[3].x, v[3].y, 0, 1);
        endShape(CLOSE);
      }

      // --- OVERLAY 2D (puntos) ---
      if (uiVisible) {

        push();
        resetMatrix();
        translate(-width / 2, -height / 2);

        fill(255, 0, 0);
        noStroke();

        for (let q = 0; q < quads.length; q++) {
          let v = quads[q];

          for (let i = 0; i < v.length; i++) {
            let sx = v[i].x + width / 2;
            let sy = v[i].y + height / 2;
            ellipse(sx, sy, 12, 12);
          }
        }

        pop();
      }
    }

    function setQuadCount(n) {
      n = int(n);
      quads = [];

      let spacing = 500; // distancia entre quads
      let totalWidth = (n - 1) * spacing;

      for (let i = 0; i < n; i++) {

        // posición centrada
        let xOffset = i * spacing - totalWidth / 2;

        quads.push([
          createVector(-200 + xOffset, -200),
          createVector(200 + xOffset, -200),
          createVector(200 + xOffset, 200),
          createVector(-200 + xOffset, 200)
        ]);
      }
    }

    // --- INTERACCIÓN ---

    function mousePressed() {
      for (let q = 0; q < quads.length; q++) {
        let v = quads[q];

        for (let i = 0; i < v.length; i++) {
          let sx = v[i].x + width / 2;
          let sy = v[i].y + height / 2;

          if (dist(mouseX, mouseY, sx, sy) < 12) {
            selected = { quad: q, vert: i };
            return;
          }
        }
      }
    }
    for (let i = 0; i < verts.length; i++) {
      let sx = verts[i].x + width / 2;
      let sy = verts[i].y + height / 2;

      if (dist(mouseX, mouseY, sx, sy) < 12) {
        selected = i;
      }
    }


    function mouseDragged() {
      if (selected.quad != -1) {
        let v = quads[selected.quad][selected.vert];
        v.x = mouseX - width / 2;
        v.y = mouseY - height / 2;
      }
    }

    function mouseReleased() {
      selected = { quad: -1, vert: -1 };
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>

</body>

</html>
